<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  fill="none"
>
  <defs>
    <linearGradient
      id="salesGradient"
      x1="12"
      y1="4"
      x2="12"
      y2="20"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#FBB35A" />
      <stop offset="100%" stop-color="#E88100" />
    </linearGradient>
  </defs>

  <!-- Card / cliente -->
  <rect
    x="3"
    y="4"
    width="18"
    height="16"
    rx="2"
    stroke="url(#salesGradient)"
    stroke-width="2"
  />

  <!-- Barras de vendas mensais -->
  <path
    d="M8 16V12M12 16V9M16 16V11"
    stroke="url(#salesGradient)"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
